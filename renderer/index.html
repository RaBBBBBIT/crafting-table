<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作台 - Crafting Table</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">🛠 工作台</h1>
      </div>

      <nav class="category-nav">
        <div class="category-nav-header">
          <span>分类</span>
          <button id="btn-add-category" class="icon-btn" title="添加分类">＋</button>
        </div>
        <ul id="category-list">
          <li class="category-item active" data-id="all">
            <span class="category-dot" style="background:#888;"></span>
            <span class="category-name">全部任务</span>
            <span class="category-count" id="count-all">0</span>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <header class="content-header">
        <h2 id="current-category-title">全部任务</h2>
        <button id="btn-add-task" class="btn btn-primary">＋ 新建任务</button>
      </header>

      <div class="filter-bar">
        <button class="filter-btn active" data-status="all">全部</button>
        <button class="filter-btn" data-status="pending">待处理</button>
        <button class="filter-btn" data-status="in_progress">进行中</button>
        <button class="filter-btn" data-status="done">已完成</button>
      </div>

      <div id="task-list" class="task-list">
        <p class="empty-hint">暂无任务，点击「新建任务」开始吧 🚀</p>
      </div>
    </main>
  </div>

  <!-- Modal: Add/Edit Task -->
  <div id="modal-task" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-box">
      <h3 id="modal-task-title">新建任务</h3>
      <form id="form-task">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label for="task-title">标题 <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="任务标题" required />
        </div>
        <div class="form-group">
          <label for="task-desc">描述</label>
          <textarea id="task-desc" rows="3" placeholder="任务描述（可选）"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-status">状态</label>
            <select id="task-status">
              <option value="pending">待处理</option>
              <option value="in_progress">进行中</option>
              <option value="done">已完成</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-priority">优先级</label>
            <select id="task-priority">
              <option value="0">普通</option>
              <option value="1">高</option>
              <option value="2">紧急</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-category">分类</label>
            <select id="task-category">
              <option value="">无分类</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-task" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add/Edit Category -->
  <div id="modal-category" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-box modal-box-sm">
      <h3 id="modal-category-title">新建分类</h3>
      <form id="form-category">
        <input type="hidden" id="category-id" />
        <div class="form-group">
          <label for="category-name">名称 <span class="required">*</span></label>
          <input type="text" id="category-name" placeholder="分类名称" required />
        </div>
        <div class="form-group">
          <label for="category-color">颜色</label>
          <input type="color" id="category-color" value="#4CAF50" />
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-category" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
