<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>开发工作台 - Crafting Table</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>开发工作台</h1>
        <p id="apiSummary">当前通过远端接口读写工作台数据。</p>
      </div>
      <div class="actions">
        <span class="api-badge" id="apiStatusBadge">接口未连接</span>
        <button class="primary" id="addProjectBtn" type="button">新增项目</button>
        <button id="addInboxBtn" type="button">新增收集项</button>
        <button id="openSettingsBtn" type="button">接口配置</button>
        <button class="warn" id="resetBtn" type="button">重置远端数据</button>
      </div>
    </div>

    <section class="top-grid">
      <section class="panel overview">
        <div class="panel-header">
          <h2>总览</h2>
          <div class="meta">统计</div>
        </div>
        <div class="panel-body">
          <div class="overview-mini" id="summaryRow"></div>
          <div class="save-status" id="saveStatus">正在连接后台接口...</div>
        </div>
      </section>

      <section class="panel today">
        <div class="panel-header">
          <h2>今日安排</h2>
          <div class="meta">主线</div>
        </div>
        <div class="panel-body">
          <div class="field-grid">
            <div class="field">
              <label for="mainFocus">主任务</label>
              <input id="mainFocus" type="text" placeholder="例如：修复登录刷新问题" />
            </div>
            <div class="field">
              <label for="secondaryFocus">辅助任务</label>
              <input id="secondaryFocus" type="text" placeholder="例如：整理日志、检查输出" />
            </div>
            <div class="field">
              <label for="todayNotes">今日备注</label>
              <textarea class="today-note" id="todayNotes" placeholder="例如：今天不开新坑；等待 AI 跑完后先检查结果"></textarea>
            </div>
          </div>
        </div>
      </section>

      <section class="panel inbox">
        <div class="panel-header">
          <h2>临时收集</h2>
          <div class="meta">先记</div>
        </div>
        <div class="panel-body">
          <div class="inbox-list" id="inboxList"></div>
          <div class="footer-note">这里只放临时想法或还没排期的事项。</div>
        </div>
      </section>
    </section>

    <section class="board-panel">
      <div class="board-header">
        <h2>项目工作台</h2>
        <div class="meta">拖拽项目卡片可调整顺序</div>
      </div>
      <div class="project-strip" id="projectList"></div>
    </section>
  </div>

  <div class="settings-modal" id="settingsModal" aria-hidden="true">
    <div class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h3 id="settingsTitle">接口与外观配置</h3>
        <button id="closeSettingsBtn" type="button">关闭</button>
      </div>
      <div class="settings-body">
        <div class="settings-group">
          <h4>后台接口</h4>
          <div class="settings-row">
            <label for="apiBaseUrlInput">服务器地址</label>
            <input id="apiBaseUrlInput" type="text" placeholder="例如：http://127.0.0.1:8787" />
          </div>
          <div class="settings-row">
            <label>接口约定</label>
            <div class="settings-note">
              客户端会请求 `GET /api/health`、`GET /api/workbench-state` 和 `PUT /api/workbench-state`。
            </div>
          </div>
          <div class="settings-inline-actions">
            <button id="testApiBtn" type="button">测试连接</button>
            <button class="primary" id="saveApiBtn" type="button">保存并重新连接</button>
          </div>
          <div class="settings-note" id="apiTestResult">保存后会从新地址重新拉取工作台数据。</div>
        </div>

        <div class="settings-group">
          <h4>主题模式</h4>
          <div class="settings-row">
            <label>模式</label>
            <div class="custom-select" id="themeSelect">
              <button class="custom-select-button" id="themeSelectButton" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="themeSelectLabel">跟随系统</span>
                <span class="arrow">▾</span>
              </button>
              <div class="custom-select-menu" id="themeSelectMenu" role="listbox" aria-label="主题模式选择">
                <button class="custom-option active" type="button" data-value="system">跟随系统</button>
                <button class="custom-option" type="button" data-value="dark">深色</button>
                <button class="custom-option" type="button" data-value="light">浅色</button>
              </div>
            </div>
          </div>
          <div class="settings-note">当前项目已经改成前后端分离：本地只保存接口配置，工作台内容由远端服务负责。</div>
        </div>
      </div>
      <div class="settings-footer">
        <button class="primary" id="confirmSettingsBtn" type="button">完成</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
